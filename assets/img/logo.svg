<svg viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Viridite">
  <defs>
    <linearGradient id="viridite-bg" x1="0" y1="0" x2="0" y2="64" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0f3527"/>
      <stop offset="1" stop-color="#06150f"/>
    </linearGradient>
    <linearGradient id="viridite-gem" x1="20" y1="14" x2="46" y2="52" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#6cf0bf"/>
      <stop offset=".5" stop-color="#35e0a2"/>
      <stop offset="1" stop-color="#0f8a54"/>
    </linearGradient>
  </defs>
  <!-- App-icon tile: rounded square so the header/hero border-radius + shadow
       read correctly, with the faceted green gem (a "V") centred on it. -->
  <rect width="64" height="64" rx="15" fill="url(#viridite-bg)"/>
  <!-- crown (top band) -->
  <path d="M16 18 H48 L43 29 H21 Z" fill="url(#viridite-gem)"/>
  <!-- pavilion (points down, reads as V) -->
  <path d="M21 29 H43 L32 50 Z" fill="url(#viridite-gem)"/>
  <!-- top highlight -->
  <path d="M16 18 H48 L45.5 23 H18.5 Z" fill="#ffffff" opacity=".22"/>
  <!-- facet lines -->
  <g stroke="#052018" stroke-opacity=".28" stroke-width="1.3" stroke-linejoin="round">
    <path d="M16 18 L21 29 M48 18 L43 29 M21 29 L32 50 M43 29 L32 50 M32 29 V50"/>
  </g>
  <!-- left-face sheen -->
  <path d="M21 29 L32 29 L32 50 Z" fill="#ffffff" opacity=".06"/>
</svg>
